name: validate-tsmm-native

on:
  # Validate all package classes on every push to main and on every pull request.
  # This keeps the repository trustworthy as a developer-facing corpus rather than
  # allowing invalid examples or broken package metadata to accumulate silently.
  push:
    branches: [ main ]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install jsonschema pyyaml
      - name: Validate TSMM-native packages
        run: python3 scripts/validate_tsmm_native.py

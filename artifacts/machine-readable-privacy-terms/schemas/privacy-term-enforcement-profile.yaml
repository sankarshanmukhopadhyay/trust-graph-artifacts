id: privacy-term-enforcement-profile
version: 0.2.0
type: object
required:
- profile_id
- allowed_purposes
- prohibited_uses
- retention
- transfer_policy
- complaint_channel
properties:
  profile_id:
    type: string
  allowed_purposes:
    type: array
    minItems: 1
    items:
      type: string
  prohibited_uses:
    type: array
    minItems: 1
    items:
      type: string
  retention:
    type: object
    required:
    - max_duration
    - deletion_mode
    properties:
      max_duration:
        type: string
      deletion_mode:
        type: string
        enum:
        - hard-delete
        - tombstone
        - anonymize
  transfer_policy:
    type: object
    required:
    - allow_onward_transfer
    properties:
      allow_onward_transfer:
        type: boolean
      allowed_recipient_classes:
        type: array
        items:
          type: string
      must_preserve_terms:
        type: boolean
  evidence_requirements:
    type: array
    items:
      type: string
  complaint_channel:
    type: string
  termination_effect:
    type: string
    enum:
    - stop-processing
    - stop-sharing
    - delete-or-anonymize

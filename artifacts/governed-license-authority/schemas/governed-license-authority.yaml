id: governed-license-authority
version: 0.2.0
type: object
required:
- authority_id
- authority_basis
- issuance_rights
- delegation_allowed
- revocation
- legitimacy_proof
properties:
  authority_id:
    type: string
  authority_basis:
    type: string
    enum:
    - registry
    - coalition
    - protocol
  issuance_rights:
    type: object
    required:
    - scope
    - constraints
    properties:
      scope:
        type: string
      constraints:
        type: array
        minItems: 1
        items:
          type: string
  delegation_allowed:
    type: boolean
  revocation:
    type: object
    required:
    - supported
    - propagation_model
    properties:
      supported:
        type: boolean
      propagation_model:
        type: string
        enum:
        - synchronous
        - eventual
      endpoint:
        type: string
  legitimacy_proof:
    type: object
    required:
    - required
    - evidence
    properties:
      required:
        type: boolean
      evidence:
        type: array
        minItems: 1
        items:
          type: string
          enum:
          - governance_process
          - stakeholder_inclusion
          - publication
          - appeal_body

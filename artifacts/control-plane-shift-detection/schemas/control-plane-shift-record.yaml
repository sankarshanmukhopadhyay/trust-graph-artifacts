id: control-plane-shift-record
version: 0.2.0
type: object
required:
- record_id
- subject_system
- previous_authority_model
- new_authority_model
- shift_trigger
- enforcement_surface
- legitimacy_gap_detected
- timestamp
properties:
  record_id:
    type: string
  subject_system:
    type: string
  previous_authority_model:
    type: string
    enum:
    - deliberative
    - institutional
    - community-governed
  new_authority_model:
    type: string
    enum:
    - infrastructural
    - execution-bound
    - platform-mediated
  shift_trigger:
    type: string
    enum:
    - policy
    - scaling
    - automation
    - delegation
    - intermediary-substitution
  enforcement_surface:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - component
      - control_type
      properties:
        component:
          type: string
        control_type:
          type: string
          enum:
          - execution
          - validation
          - gating
          - ranking
          - routing
        notes:
          type: string
  contestability_path:
    type: string
  revocation_path:
    type: string
  legitimacy_gap_detected:
    type: boolean
  timestamp:
    type: string
    format: date-time

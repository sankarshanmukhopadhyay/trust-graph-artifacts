id: verification-policy-profile
version: 0.1.0
type: object
required:
- profile_id
- covered_claims
- issuer_requirements
- revocation_policy
- dispute_handling
properties:
  profile_id:
    type: string
  covered_claims:
    type: array
    minItems: 1
    items:
      type: string
  issuer_requirements:
    type: object
    required:
    - must_be_registry_listed
    properties:
      must_be_registry_listed:
        type: boolean
      accepted_frameworks:
        type: array
        items:
          type: string
      minimum_assurance_level:
        type: string
  freshness:
    type: object
    properties:
      max_credential_age:
        type: string
      max_status_staleness:
        type: string
  revocation_policy:
    type: object
    required:
    - must_check
    - fail_mode
    properties:
      must_check:
        type: boolean
      fail_mode:
        type: string
        enum:
        - fail-closed
        - fail-open-with-risk-flag
      status_sources:
        type: array
        items:
          type: string
  fallback_rules:
    type: array
    items:
      type: object
      required:
      - condition
      - response
      properties:
        condition:
          type: string
        response:
          type: string
  dispute_handling:
    type: object
    required:
    - appeal_endpoint
    - evidence_retention
    properties:
      appeal_endpoint:
        type: string
      evidence_retention:
        type: string
      notify_subject:
        type: boolean

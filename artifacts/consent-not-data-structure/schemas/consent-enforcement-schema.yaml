id: consent-enforcement-schema
version: 0.2.0
type: object
required:
  - consent_id
  - subject_id
  - controller_id
  - purpose_binding
  - permitted_actions
  - constraints
  - revocation_endpoint
  - audit_reference
properties:
  consent_id:
    type: string
  subject_id:
    type: string
  controller_id:
    type: string
  purpose_binding:
    type: string
  context_scope:
    type: string
  permitted_actions:
    type: array
    minItems: 1
    items:
      type: string
      enum: [collect, store, analyze, share, infer, automate-decision]
  constraints:
    type: object
    required: [time_bound, data_category]
    properties:
      time_bound:
        type: string
        description: Duration or explicit validity window.
      jurisdiction:
        type: string
      data_category:
        type: array
        minItems: 1
        items:
          type: string
  downstream_processing_allowed:
    type: boolean
  enforcement_endpoint:
    type: string
  revocation_endpoint:
    type: string
  audit_reference:
    type: string

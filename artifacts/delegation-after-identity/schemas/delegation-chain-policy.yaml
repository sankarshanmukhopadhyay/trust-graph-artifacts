id: delegation-chain-policy
version: 0.2.0
type: object
required:
- delegation_id
- principal
- delegate
- scope
- conditions
- revocation
properties:
  delegation_id:
    type: string
  principal:
    type: string
  delegate:
    type: string
  scope:
    type: array
    minItems: 1
    items:
      type: string
  conditions:
    type: array
    items:
      type: object
      required:
      - type
      - value
      properties:
        type:
          type: string
        value:
          type: string
  subdelegation:
    type: object
    required:
    - allowed
    - max_depth
    properties:
      allowed:
        type: boolean
      max_depth:
        type: integer
        minimum: 0
      allowed_delegate_classes:
        type: array
        items:
          type: string
  revocation:
    type: object
    required:
    - check_uri
    - max_staleness
    properties:
      check_uri:
        type: string
      max_staleness:
        type: string
      fail_closed:
        type: boolean
  challenge_endpoint:
    type: string

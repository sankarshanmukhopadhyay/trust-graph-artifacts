id: wallet-agent-binding-contract
version: 0.2.0
type: object
required:
- binding_id
- wallet_principal
- agent_instance
- allowed_presentations
- allowed_requests
- session_controls
properties:
  binding_id:
    type: string
  wallet_principal:
    type: string
  agent_instance:
    type: string
  allowed_presentations:
    type: array
    minItems: 1
    items:
      type: string
  allowed_requests:
    type: array
    minItems: 1
    items:
      type: string
  value_limits:
    type: object
    properties:
      currency:
        type: string
      max_amount:
        type: number
        minimum: 0
  session_controls:
    type: object
    required:
    - expires_at
    - revocable
    properties:
      expires_at:
        type: string
        format: date-time
      revocable:
        type: boolean
      rebind_required_on_new_device:
        type: boolean
  evidence_fields:
    type: array
    items:
      type: string
  revocation_endpoint:
    type: string

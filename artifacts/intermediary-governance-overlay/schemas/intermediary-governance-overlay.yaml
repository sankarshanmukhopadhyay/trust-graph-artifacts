id: intermediary-governance-overlay
version: 0.1.0
type: object
required:
- overlay_id
- intermediary_id
- input_source
- transformation
- traceability
- governance_constraints
properties:
  overlay_id:
    type: string
  intermediary_id:
    type: string
  input_source:
    type: object
    required:
    - provenance_required
    properties:
      provenance_required:
        type: boolean
      source_classes:
        type: array
        items:
          type: string
  transformation:
    type: string
    enum:
    - summarization
    - ranking
    - synthesis
    - generation
    - recommendation
  traceability:
    type: object
    required:
    - input_trace
    - output_binding
    properties:
      input_trace:
        type: boolean
      output_binding:
        type: boolean
      transformation_log:
        type: boolean
  governance_constraints:
    type: array
    minItems: 1
    items:
      type: string
      enum:
      - attribution
      - fidelity
      - restriction
      - disclosure
      - appealability
  violation_detection:
    type: object
    properties:
      enabled:
        type: boolean
      route:
        type: string

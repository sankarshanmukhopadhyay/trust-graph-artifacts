id: delegated-consent-protection-policy
version: 0.2.0
type: object
required:
- policy_id
- subject_id
- permitted_actions
- delegation_scope
- protection_rules
- revocation
- appeal
properties:
  policy_id:
    type: string
  subject_id:
    type: string
  permitted_actions:
    type: array
    minItems: 1
    items:
      type: string
  purpose:
    type: string
  delegation_scope:
    type: object
    required:
    - allowed_delegate_types
    - max_chain_depth
    properties:
      allowed_delegate_types:
        type: array
        minItems: 1
        items:
          type: string
      max_chain_depth:
        type: integer
        minimum: 0
      must_log_subdelegation:
        type: boolean
  protection_rules:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - trigger
      - effect
      properties:
        trigger:
          type: string
        effect:
          type: string
          enum:
          - pause
          - deny
          - escalate
          - require-reconsent
  revocation:
    type: object
    required:
    - mode
    - latency_expectation
    properties:
      mode:
        type: string
        enum:
        - instant
        - end-of-session
        - scheduled
      latency_expectation:
        type: string
      notify_subject:
        type: boolean
  appeal:
    type: object
    required:
    - endpoint
    - sla
    properties:
      endpoint:
        type: string
      sla:
        type: string

id: first-person-assertion-envelope
version: 0.2.0
type: object
required:
  - assertion_id
  - subject_id
  - claim
  - attestation_method
  - evidence_links
  - counterparty_requirements
  - dispute_endpoint
properties:
  assertion_id:
    type: string
    description: Stable identifier for the assertion envelope.
  subject_id:
    type: string
    description: Identifier of the subject making the assertion.
  claim:
    type: object
    required: [type, statement]
    properties:
      type:
        type: string
      statement:
        type: string
      scope:
        type: string
  attestation_method:
    type: string
    enum: [self-signed, witnessed, hardware-bound, delegated-agent-attested]
  evidence_links:
    type: array
    minItems: 1
    items:
      type: object
      required: [uri, role]
      properties:
        uri:
          type: string
        role:
          type: string
          enum: [supporting, corroborating, contextual, challenge-response]
  counterparty_requirements:
    type: array
    minItems: 1
    items:
      type: string
  confidence_score:
    type: number
    minimum: 0
    maximum: 1
  valid_until:
    type: string
    format: date-time
  supersedes:
    type: string
  dispute_endpoint:
    type: string
    description: Endpoint or process reference for contesting the assertion.

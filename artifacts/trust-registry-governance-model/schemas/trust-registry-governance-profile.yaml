id: trust-registry-governance-profile
version: 0.2.0
type: object
required:
- registry_id
- operator
- recognition_policy
- suspension_policy
- appeals
properties:
  registry_id:
    type: string
  operator:
    type: string
  governance_model:
    type: string
    enum:
    - public
    - consortium
    - foundation
    - platform
    - hybrid
  recognition_policy:
    type: object
    required:
    - eligibility_criteria
    - decision_authority
    properties:
      eligibility_criteria:
        type: array
        minItems: 1
        items:
          type: string
      decision_authority:
        type: string
      published_sla:
        type: string
  pricing_disclosure:
    type: object
    properties:
      has_fees:
        type: boolean
      fee_url:
        type: string
      subsidy_model:
        type: string
  suspension_policy:
    type: object
    required:
    - grounds
    - effective_latency
    properties:
      grounds:
        type: array
        minItems: 1
        items:
          type: string
      effective_latency:
        type: string
      public_notice_required:
        type: boolean
  interoperability_policy:
    type: object
    properties:
      accepts_external_registries:
        type: boolean
      cross_registry_query_mode:
        type: string
        enum:
        - none
        - manual
        - federated
        - meta-registry
  appeals:
    type: object
    required:
    - endpoint
    - review_body
    properties:
      endpoint:
        type: string
      review_body:
        type: string
      publication_required:
        type: boolean

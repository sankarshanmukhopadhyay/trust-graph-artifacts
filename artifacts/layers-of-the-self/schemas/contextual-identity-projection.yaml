id: contextual-identity-projection
version: 0.1.0
type: object
required:
  - projection_id
  - base_identity_reference
  - active_role
  - context
  - attribute_subset
  - disclosure_policy
  - linkage_rules
properties:
  projection_id:
    type: string
  base_identity_reference:
    type: string
  active_role:
    type: string
  context:
    type: string
  attribute_subset:
    type: array
    minItems: 1
    items:
      type: string
  disclosure_policy:
    type: object
    required: [audience, permitted_use]
    properties:
      audience:
        type: array
        minItems: 1
        items:
          type: string
      permitted_use:
        type: string
      retention_limit:
        type: string
  linkage_rules:
    type: object
    required: [correlatable]
    properties:
      correlatable:
        type: boolean
      allowed_linkage_authorities:
        type: array
        items:
          type: string
  valid_until:
    type: string
    format: date-time
  invalidation_endpoint:
    type: string

id: knowledge-substrate-integrity-profile
version: 0.2.0
type: object
required:
- profile_id
- source_integrity
- transformation_integrity
- output_constraints
- failure_modes
properties:
  profile_id:
    type: string
  source_integrity:
    type: object
    required:
    - verified
    properties:
      verified:
        type: boolean
      source_registry:
        type: string
  transformation_integrity:
    type: object
    required:
    - deterministic
    - auditable
    properties:
      deterministic:
        type: boolean
      auditable:
        type: boolean
      method_reference:
        type: string
  output_constraints:
    type: object
    required:
    - must_preserve
    properties:
      must_preserve:
        type: array
        minItems: 1
        items:
          type: string
          enum:
          - provenance
          - attribution
          - policy_binding
          - context
          - appealability
  failure_modes:
    type: array
    minItems: 1
    items:
      type: string
      enum:
      - hallucination
      - attribution_loss
      - policy_violation
      - context_collapse
      - source_detachment

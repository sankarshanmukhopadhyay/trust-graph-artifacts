id: coalition-legitimacy-model
version: 0.1.0
type: object
required:
- model_id
- participants
- decision_model
- capture_risk
- legitimacy_conditions
properties:
  model_id:
    type: string
  participants:
    type: array
    minItems: 2
    items:
      type: object
      required:
      - entity_id
      - role
      properties:
        entity_id:
          type: string
        role:
          type: string
          enum:
          - issuer
          - validator
          - observer
          - appeal-body
          - steward
  decision_model:
    type: string
    enum:
    - consensus
    - weighted
    - delegated
  capture_risk:
    type: object
    required:
    - assessed
    - mitigation
    properties:
      assessed:
        type: boolean
      mitigation:
        type: array
        minItems: 1
        items:
          type: string
          enum:
          - rotation
          - audit
          - transparency
          - diversity-threshold
  legitimacy_conditions:
    type: array
    minItems: 1
    items:
      type: string
      enum:
      - inclusivity
      - contestability
      - auditability
      - publication
      - bounded_scope
  failure_condition:
    type: array
    items:
      type: string
      enum:
      - concentration_of_power
      - opaque_voting
      - no_appeal
      - scope_drift

id: agent-mandate-envelope
version: 0.1.0
type: object
required:
- mandate_id
- issuer
- operator
- permitted_actions
- prohibited_actions
- escalation_rules
- evidence_requirements
properties:
  mandate_id:
    type: string
  issuer:
    type: string
  operator:
    type: string
  permitted_actions:
    type: array
    minItems: 1
    items:
      type: string
  prohibited_actions:
    type: array
    minItems: 1
    items:
      type: string
  escalation_rules:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - trigger
      - required_response
      properties:
        trigger:
          type: string
        required_response:
          type: string
          enum:
          - human-approval
          - pause
          - deny
          - route-to-specialist
  evidence_requirements:
    type: array
    minItems: 1
    items:
      type: string
  sunset:
    type: string
    format: date-time
  rollback_reference:
    type: string

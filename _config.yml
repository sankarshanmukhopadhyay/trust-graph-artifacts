title: Trust Graph Artifacts
description: TSMM-native executable governance artifacts derived from The Trust Graph corpus.
url: ""
baseurl: "/trust-graph-artifacts"

# Just the Docs/Jekyll publication surface.
# For GitHub Pages project sites, keep baseurl aligned with the repository name.
remote_theme: just-the-docs/just-the-docs

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/

heading_anchors: true
nav_sort: case_insensitive
permalink: pretty

aux_links:
  "Trust Graph Artifacts on GitHub":
    - "https://github.com/sankarshanmukhopadhyay/trust-graph-artifacts"

footer_content: "Trust Graph Artifacts: executable governance corpus for TSMM-native trust-system modeling."
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d %H:%M"

gh_edit_link: false

callouts:
  governance:
    title: Governance note
    color: blue
  assurance:
    title: Assurance note
    color: green
  warning:
    title: Warning
    color: yellow

# Treat the documentation surface as the canonical navigation layer while
# preserving source packages, schemas, examples, and validation assets as
# repository artifacts.
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

exclude:
  - .github/
  - .gitignore
  - Gemfile.lock
  - vendor/
  - node_modules/
  - COMMIT_BUNDLE_*.md
  - scripts/

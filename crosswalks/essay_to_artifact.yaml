  artifacts:
  - profiles/fraud-externality-verification-profile
  - profiles/trust-registry-governance-model
  - profiles/digital-credential-verification-policy-playbook
  receipts:
  - fraud_externality_assessment
  - issuer_accountability
  - registry_governance
- essay:
    title: Before the Graph
    url: https://thetrustgraph.substack.com/p/before-the-graph
    publishedDate: '2026-04-13'
  claim: Digital governance fails when inference substitutes for verifiable identity,
    claims, authority, and provenance, then demands more legibility instead of better
    verification.
  artifacts:
  - patterns/inference-substitution-gap
  - patterns/legibility-trap-detector
  - patterns/control-plane-shift-detection
  receipts:
  - inference_substitution_assessment
  - legibility_trap_signal
  - decision
- essay:
    title: Governance for High-Risk Digital Infrastructure
    url: https://thetrustgraph.substack.com/p/governance-for-high-risk-digital
    publishedDate: '2026-04-08'
  claim: 'High-risk digital infrastructure requires architectural governance: traceability,

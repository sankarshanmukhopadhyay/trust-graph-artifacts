    reliance.
  artifacts:
  - profiles/machine-commitment-governance-profile
  - evidence/proof-carrying-commitment-receipt
  - overlays/commitment-lifecycle-mediation
  receipts:
  - proof_carrying_commitment
  - commitment_lifecycle
  - decision
- essay:
    title: Fraud as an Externality of Missing Infrastructure
    url: https://thetrustgraph.substack.com/p/fraud-as-an-externality-of-missing
    publishedDate: '2026-05-05'
  claim: Fraud cost is externalized when identity, claims, provenance, issuer authority,

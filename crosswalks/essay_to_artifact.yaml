- essay:
    title: Who Holds the License
    url: https://thetrustgraph.substack.com/p/who-holds-the-license
    publishedDate: 2026-04-18
  claim: A licensing coalition must prove its authority rather than reproduce the
    legitimacy failures it seeks to correct.

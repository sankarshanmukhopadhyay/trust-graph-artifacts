- essay:
    title: The Persistence Trap
    url: https://thetrustgraph.substack.com/p/the-persistence-trap
    publishedDate: '2026-04-14'
  claim: Preserved artifacts can outlive the authority conditions that made them legitimate.
  artifacts:
  - patterns/persistence-trap-detector
  - overlays/execution-bound-revocation
  receipts:
  - execution_authority_state
  - revocation_propagation
- essay:
    title: Exploiting the Revocation Lag Gradient
    url: https://thetrustgraph.substack.com/p/exploiting-the-revocation-lag-gradient
    publishedDate: '2026-04-17'
  claim: Revocation becomes effective only when execution environments stop accepting
    revoked authority within a measurable propagation window.
  artifacts:
  - patterns/revocation-lag-analyzer
  - profiles/compositional-revocation-profile
  - overlays/execution-bound-revocation
  receipts:
  - revocation_propagation
  - execution_authority_state
- essay:
    title: When the Gradient Is the Attack Surface
    url: https://thetrustgraph.substack.com/p/when-the-gradient-is-the-attack-surface
    publishedDate: '2026-04-21'
  claim: Revocation lag can be deliberately exploited through timing, routing, and
    delegation before evidence can prove intent.
  artifacts:
  - patterns/gradient-exploitation-surface
  - profiles/compositional-revocation-profile
  receipts:
  - gradient_exploitation_signal
  - execution_authority_state
- essay:
    title: The Authority Gap
    url: https://thetrustgraph.substack.com/p/the-authority-gap
    publishedDate: '2026-05-06'
  claim: Agentic systems become governable only when identity is wrapped by runtime
    authority, mandate, scope, revocation state, evidence, and redress.
  artifacts:
  - patterns/runtime-authority-envelope
  - patterns/agent-mandate-envelope
  - evidence/execution-time-delegation
  receipts:
  - authority_envelope
  - execution_authority_state
  - decision
- essay:
    title: When Machines Make Commitments
    url: https://thetrustgraph.substack.com/p/when-machines-make-commitments
    publishedDate: '2026-05-05'
  claim: Machine-generated commitments require proof-carrying authority, lifecycle

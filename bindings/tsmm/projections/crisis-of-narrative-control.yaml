bindingId: tga.tsmm.crisis-of-narrative-control
label: TSMM projection for crisis-of-narrative-control
artifactRef: artifacts/crisis-of-narrative-control/artifact.yaml
sourceEssay: Crisis of Narrative Control
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.crisis-of-narrative-control
    label: Contestability and narrative control governance
    description: Trust Graph operationalization of Crisis of Narrative Control as
      executable governance.
  profile:
    id: profile.narrative.contestability
    label: Narrative Contestability Record
    constraintSetRef: artifacts/crisis-of-narrative-control/schemas/narrative-contestability-record.yaml
  entities:
  - id: entity.platform-operator
    type: GovernanceAuthority
    label: Platform Operator
    description: Platform or operator shaping narrative visibility and control
    roles:
    - id: role.platform-operator
      label: Platform Operator
      authorityRefs:
      - authority.platform-operator
    authorities:
    - id: authority.platform-operator
      scope: Platform or operator shaping narrative visibility and control
      source: profile.narrative.contestability
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.affected-speaker
    type: Subject
    label: Affected Speaker
    description: Party affected by narrative control action
    roles:
    - id: role.affected-speaker
      label: Affected Speaker
      authorityRefs:
      - authority.affected-speaker
    authorities:
    - id: authority.affected-speaker
      scope: Party affected by narrative control action
      source: profile.narrative.contestability
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.contestability-service
    type: Verifier
    label: Contestability Service
    description: Service recording reasons and enabling contest
    roles:
    - id: role.contestability-service
      label: Contestability Service
      authorityRefs:
      - authority.contestability-service
    authorities:
    - id: authority.contestability-service
      scope: Service recording reasons and enabling contest
      source: profile.narrative.contestability
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.review-panel
    type: Assessment
    label: Review Panel
    description: Review body evaluating contested decisions
    roles:
    - id: role.review-panel
      label: Review Panel
      authorityRefs:
      - authority.review-panel
    authorities:
    - id: authority.review-panel
      scope: Review body evaluating contested decisions
      source: profile.narrative.contestability
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: crisis-of-narrative-control.rel.1
    type: holdsRole
    from: entity.platform-operator
    to: role.moderator
    description: Operator can shape visibility, ranking, or suppression
  - id: crisis-of-narrative-control.rel.2
    type: affects
    from: entity.platform-operator
    to: entity.affected-speaker
    description: Narrative control action changes communicative effect
  - id: crisis-of-narrative-control.rel.3
    type: records
    from: entity.contestability-service
    to: artifact.narrative-contestability.record
    description: Service records reasons, facts, and appeal path
  - id: crisis-of-narrative-control.rel.4
    type: routesTo
    from: entity.contestability-service
    to: entity.review-panel
    description: Contested actions route to structured review
  - id: crisis-of-narrative-control.rel.5
    type: supports
    from: artifact.narrative-contestability.record
    to: decision.narrative.control
    description: Record substantiates control decision
  artifacts:
  - id: artifact.crisis.of.narrative.control
    type: Artifact
    label: Narrative Contestability Record
    sourceRef: artifacts/crisis-of-narrative-control/artifact.yaml
    schemaRef: artifacts/crisis-of-narrative-control/schemas/narrative-contestability-record.yaml
  policies:
  - id: policy.crisis.of.narrative.control
    label: Narrative Contestability Record
    decisionMode: mixed
    profileRef: profile.narrative.contestability
    rules:
    - Require structured reasons for material narrative control
    - Provide bounded path for challenge and review
    - Trace what downstream effect a control action caused
    contextRef: context.crisis-of-narrative-control
  controls:
  - id: control.reason-code-required
    type: decision-explanation
    description: Require structured reasons for material narrative control
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.uncontestable-control
    - threat.hidden-effect-shaping
  - id: control.appeal-route
    type: contestability
    description: Provide bounded path for challenge and review
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.uncontestable-control
    - threat.hidden-effect-shaping
  - id: control.effect-traceability
    type: effect-trace
    description: Trace what downstream effect a control action caused
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.uncontestable-control
    - threat.hidden-effect-shaping
  threats:
  - id: threat.uncontestable-control
    type: governance-opacity
    description: Narrative control occurs without evidence or challenge path
  - id: threat.hidden-effect-shaping
    type: effect-opacity
    description: Ranking or suppression effects cannot be inspected
  evidence:
  - id: evidence.narrative.control.record
    type: decision-receipt
    description: Structured evidence bundle for Narrative Contestability Record.
    supportsRefs:
    - policy.crisis.of.narrative.control
    - decision.narrative.control
    - control.reason-code-required
    - control.appeal-route
    - control.effect-traceability
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.crisis.of.narrative.control
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.crisis.of.narrative.control
    - evidence.narrative.control.record
  trustDecisions:
  - id: decision.narrative.control
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.crisis.of.narrative.control
    verificationRefs:
    - verification.crisis.of.narrative.control
    effectRefs:
    - effect.apply-control-action
    - effect.route-contest
    - effect.reverse-control-action
    contextRef: context.crisis-of-narrative-control
  effects:
  - id: effect.apply-control-action
    class: operational
    action: Apply visibility or suppression control
    status: conditional
  - id: effect.route-contest
    class: governance
    action: Route affected party to review
    status: conditional
  - id: effect.reverse-control-action
    class: protective
    action: Reverse action upon successful contest
    status: conditional
  lifecycle:
    modelId: lifecycle.crisis-of-narrative-control
    label: Lifecycle for Narrative Contestability Record
    appliesTo:
    - artifact.crisis.of.narrative.control
    - decision.narrative.control
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Narrative Contestability Record
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.narrative.control.record
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.narrative.control
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

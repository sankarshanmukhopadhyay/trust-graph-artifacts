bindingId: tga.tsmm.after-consent
label: TSMM projection for after-consent
artifactRef: artifacts/after-consent/artifact.yaml
sourceEssay: 'After Consent: Rebuilding Choice, Delegation, and Protection for an
  AI-Mediated World'
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.after-consent
    label: AI-mediated choice and consent governance
    description: 'Trust Graph operationalization of After Consent: Rebuilding Choice,
      Delegation, and Protection for an AI-Mediated World as executable governance.'
  profile:
    id: profile.after-consent.protection
    label: Delegated Consent Protection Policy
    constraintSetRef: artifacts/after-consent/schemas/delegated-consent-protection-policy.yaml
  entities:
  - id: entity.subject
    type: Subject
    label: Subject
    description: Person whose consent and protection status is evaluated
    roles:
    - id: role.subject
      label: Subject
      authorityRefs:
      - authority.subject
    authorities:
    - id: authority.subject
      scope: Person whose consent and protection status is evaluated
      source: profile.after-consent.protection
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.delegate-agent
    type: Agent
    label: Delegate Agent
    description: Delegated agent acting within subject-bound constraints
    roles:
    - id: role.delegate-agent
      label: Delegate Agent
      authorityRefs:
      - authority.delegate-agent
    authorities:
    - id: authority.delegate-agent
      scope: Delegated agent acting within subject-bound constraints
      source: profile.after-consent.protection
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.policy-enforcer
    type: Verifier
    label: Policy Enforcer
    description: Runtime policy enforcement service
    roles:
    - id: role.policy-enforcer
      label: Policy Enforcer
      authorityRefs:
      - authority.policy-enforcer
    authorities:
    - id: authority.policy-enforcer
      scope: Runtime policy enforcement service
      source: profile.after-consent.protection
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.redress-authority
    type: GovernanceAuthority
    label: Redress Authority
    description: Authority handling appeal and correction
    roles:
    - id: role.redress-authority
      label: Redress Authority
      authorityRefs:
      - authority.redress-authority
    authorities:
    - id: authority.redress-authority
      scope: Authority handling appeal and correction
      source: profile.after-consent.protection
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: after-consent.rel.1
    type: holdsRole
    from: entity.subject
    to: role.principal
    description: Subject is principal for consent and protection decisions
  - id: after-consent.rel.2
    type: holdsRole
    from: entity.delegate-agent
    to: role.delegate
    description: Agent acts only under declared delegated scope
  - id: after-consent.rel.3
    type: carriesAuthority
    from: role.delegate
    to: authority.delegate.consent-limited
    description: Delegation is purpose-bound and revocable
  - id: after-consent.rel.4
    type: evaluates
    from: entity.policy-enforcer
    to: artifact.after-consent.policy
    description: Runtime enforcement evaluates policy before effect
  - id: after-consent.rel.5
    type: routesTo
    from: entity.policy-enforcer
    to: entity.redress-authority
    description: Exceptions and contests route to redress
  artifacts:
  - id: artifact.after.consent
    type: Artifact
    label: Delegated Consent Protection Policy
    sourceRef: artifacts/after-consent/artifact.yaml
    schemaRef: artifacts/after-consent/schemas/delegated-consent-protection-policy.yaml
  policies:
  - id: policy.after.consent
    label: Delegated Consent Protection Policy
    decisionMode: mixed
    profileRef: profile.after-consent.protection
    rules:
    - Restrict delegated action to declared purpose and action class
    - Prevent hidden over-delegation across agent chains
    - Pause or deny on withdrawal, harm trigger, or re-consent requirement
    contextRef: context.after-consent
  controls:
  - id: control.purpose-binding
    type: purpose-binding
    description: Restrict delegated action to declared purpose and action class
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.consent-drift
    - threat.stale-withdrawal
  - id: control.chain-depth-limit
    type: delegation-depth
    description: Prevent hidden over-delegation across agent chains
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.consent-drift
    - threat.stale-withdrawal
  - id: control.withdrawal-enforcement
    type: revocation-check
    description: Pause or deny on withdrawal, harm trigger, or re-consent requirement
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.consent-drift
    - threat.stale-withdrawal
  threats:
  - id: threat.consent-drift
    type: policy-bypass
    description: Delegated use drifts beyond the consented purpose
  - id: threat.stale-withdrawal
    type: stale-state
    description: Revoked or narrowed consent is ignored at execution time
  evidence:
  - id: evidence.after-consent.receipt
    type: decision-receipt
    description: Structured evidence bundle for Delegated Consent Protection Policy.
    supportsRefs:
    - policy.after.consent
    - decision.after-consent.enforcement
    - control.purpose-binding
    - control.chain-depth-limit
    - control.withdrawal-enforcement
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.after.consent
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.after.consent
    - evidence.after-consent.receipt
  trustDecisions:
  - id: decision.after-consent.enforcement
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.after.consent
    verificationRefs:
    - verification.after.consent
    effectRefs:
    - effect.allow-delegated-action
    - effect.pause-action
    - effect.route-redress
    contextRef: context.after-consent
  effects:
  - id: effect.allow-delegated-action
    class: operational
    action: Permit bounded delegated action
    status: conditional
  - id: effect.pause-action
    class: protective
    action: Pause pending re-consent or review
    status: conditional
  - id: effect.route-redress
    class: governance
    action: Escalate contested outcome to appeal
    status: conditional
  lifecycle:
    modelId: lifecycle.after-consent
    label: Lifecycle for Delegated Consent Protection Policy
    appliesTo:
    - artifact.after.consent
    - decision.after-consent.enforcement
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Delegated Consent Protection Policy
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.after-consent.receipt
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.after-consent.enforcement
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

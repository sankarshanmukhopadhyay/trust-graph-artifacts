bindingId: tga.tsmm.machine-readable-privacy-terms
label: TSMM projection for machine-readable-privacy-terms
artifactRef: artifacts/machine-readable-privacy-terms/artifact.yaml
sourceEssay: Machine-Readable Privacy Terms and the Infrastructure of Control
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.machine-readable-privacy-terms
    label: Machine-readable privacy constraints at runtime
    description: Trust Graph operationalization of Machine-Readable Privacy Terms
      and the Infrastructure of Control as executable governance.
  profile:
    id: profile.privacy.term.enforcement
    label: Privacy Term Enforcement Profile
    constraintSetRef: artifacts/machine-readable-privacy-terms/schemas/privacy-term-enforcement-profile.yaml
  entities:
  - id: entity.data-subject
    type: Subject
    label: Data Subject
    description: Person whose privacy terms govern use
    roles:
    - id: role.data-subject
      label: Data Subject
      authorityRefs:
      - authority.data-subject
    authorities:
    - id: authority.data-subject
      scope: Person whose privacy terms govern use
      source: profile.privacy.term.enforcement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.processor-agent
    type: Agent
    label: Processor Agent
    description: Processor or service acting on privacy-constrained data
    roles:
    - id: role.processor-agent
      label: Processor Agent
      authorityRefs:
      - authority.processor-agent
    authorities:
    - id: authority.processor-agent
      scope: Processor or service acting on privacy-constrained data
      source: profile.privacy.term.enforcement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.policy-engine
    type: Verifier
    label: Policy Engine
    description: Policy engine evaluating privacy terms
    roles:
    - id: role.policy-engine
      label: Policy Engine
      authorityRefs:
      - authority.policy-engine
    authorities:
    - id: authority.policy-engine
      scope: Policy engine evaluating privacy terms
      source: profile.privacy.term.enforcement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.controller-authority
    type: GovernanceAuthority
    label: Controller Authority
    description: Authority defining applicable privacy profile or overrides
    roles:
    - id: role.controller-authority
      label: Controller Authority
      authorityRefs:
      - authority.controller-authority
    authorities:
    - id: authority.controller-authority
      scope: Authority defining applicable privacy profile or overrides
      source: profile.privacy.term.enforcement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: machine-readable-privacy-terms.rel.1
    type: holdsRole
    from: entity.data-subject
    to: role.rights-holder
    description: Subject anchors rights and permissible uses
  - id: machine-readable-privacy-terms.rel.2
    type: holdsRole
    from: entity.processor-agent
    to: role.data-processor
    description: Processor acts only under declared privacy terms
  - id: machine-readable-privacy-terms.rel.3
    type: evaluates
    from: entity.policy-engine
    to: artifact.privacy-term.profile
    description: Engine enforces privacy obligations at runtime
  - id: machine-readable-privacy-terms.rel.4
    type: constrains
    from: artifact.privacy-term.profile
    to: entity.processor-agent
    description: Profile constrains purpose, retention, onward transfer, and sharing
  - id: machine-readable-privacy-terms.rel.5
    type: routesTo
    from: entity.policy-engine
    to: entity.controller-authority
    description: Contested or exceptional cases route to authority
  artifacts:
  - id: artifact.machine.readable.privacy.terms
    type: Artifact
    label: Privacy Term Enforcement Profile
    sourceRef: artifacts/machine-readable-privacy-terms/artifact.yaml
    schemaRef: artifacts/machine-readable-privacy-terms/schemas/privacy-term-enforcement-profile.yaml
  policies:
  - id: policy.machine.readable.privacy.terms
    label: Privacy Term Enforcement Profile
    decisionMode: mixed
    profileRef: profile.privacy.term.enforcement
    rules:
    - Restrict processing to declared purpose and lawful basis
    - Terminate use when retention or freshness limits expire
    - Prevent downstream sharing absent permitted transfer terms
    contextRef: context.machine-readable-privacy-terms
  controls:
  - id: control.purpose-limitation
    type: purpose-control
    description: Restrict processing to declared purpose and lawful basis
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.privacy-term-ignored
    - threat.unbounded-onward-transfer
  - id: control.retention-expiry
    type: retention-control
    description: Terminate use when retention or freshness limits expire
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.privacy-term-ignored
    - threat.unbounded-onward-transfer
  - id: control.onward-transfer-check
    type: sharing-control
    description: Prevent downstream sharing absent permitted transfer terms
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.privacy-term-ignored
    - threat.unbounded-onward-transfer
  threats:
  - id: threat.privacy-term-ignored
    type: policy-bypass
    description: Machine-readable privacy restrictions are not enforced at execution
      time
  - id: threat.unbounded-onward-transfer
    type: data-exfiltration
    description: Downstream sharing exceeds subject-agreed constraints
  evidence:
  - id: evidence.privacy.term.receipt
    type: decision-receipt
    description: Structured evidence bundle for Privacy Term Enforcement Profile.
    supportsRefs:
    - policy.machine.readable.privacy.terms
    - decision.privacy.term
    - control.purpose-limitation
    - control.retention-expiry
    - control.onward-transfer-check
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.machine.readable.privacy.terms
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.machine.readable.privacy.terms
    - evidence.privacy.term.receipt
  trustDecisions:
  - id: decision.privacy.term
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.machine.readable.privacy.terms
    verificationRefs:
    - verification.machine.readable.privacy.terms
    effectRefs:
    - effect.allow-compliant-processing
    - effect.deny-noncompliant-processing
    - effect.route-privacy-appeal
    contextRef: context.machine-readable-privacy-terms
  effects:
  - id: effect.allow-compliant-processing
    class: operational
    action: Permit processing under compliant privacy terms
    status: conditional
  - id: effect.deny-noncompliant-processing
    class: protective
    action: Deny processing or sharing outside allowed terms
    status: conditional
  - id: effect.route-privacy-appeal
    class: governance
    action: Escalate contested privacy handling outcome
    status: conditional
  lifecycle:
    modelId: lifecycle.machine-readable-privacy-terms
    label: Lifecycle for Privacy Term Enforcement Profile
    appliesTo:
    - artifact.machine.readable.privacy.terms
    - decision.privacy.term
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Privacy Term Enforcement Profile
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.privacy.term.receipt
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.privacy.term
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

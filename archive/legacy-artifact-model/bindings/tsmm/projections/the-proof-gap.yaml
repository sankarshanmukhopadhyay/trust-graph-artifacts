bindingId: tga.tsmm.the-proof-gap
label: TSMM projection for the-proof-gap
artifactRef: artifacts/the-proof-gap/artifact.yaml
sourceEssay: The Proof Gap
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.the-proof-gap
    label: Evidence sufficiency and proof requirement governance
    description: Trust Graph operationalization of The Proof Gap as executable governance.
  profile:
    id: profile.proof.requirement
    label: Proof Requirement Profile
    constraintSetRef: artifacts/the-proof-gap/schemas/proof-requirement-profile.yaml
  entities:
  - id: entity.claimant
    type: Subject
    label: Claimant
    description: Party asserting a trust-relevant claim
    roles:
    - id: role.claimant
      label: Claimant
      authorityRefs:
      - authority.claimant
    authorities:
    - id: authority.claimant
      scope: Party asserting a trust-relevant claim
      source: profile.proof.requirement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.verifier
    type: Verifier
    label: Verifier
    description: Verifier evaluating sufficiency of proof
    roles:
    - id: role.verifier
      label: Verifier
      authorityRefs:
      - authority.verifier
    authorities:
    - id: authority.verifier
      scope: Verifier evaluating sufficiency of proof
      source: profile.proof.requirement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.assessor
    type: Assessment
    label: Assessor
    description: Assessment process reviewing evidence adequacy
    roles:
    - id: role.assessor
      label: Assessor
      authorityRefs:
      - authority.assessor
    authorities:
    - id: authority.assessor
      scope: Assessment process reviewing evidence adequacy
      source: profile.proof.requirement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.policy-authority
    type: GovernanceAuthority
    label: Policy Authority
    description: Authority defining acceptable proof standard
    roles:
    - id: role.policy-authority
      label: Policy Authority
      authorityRefs:
      - authority.policy-authority
    authorities:
    - id: authority.policy-authority
      scope: Authority defining acceptable proof standard
      source: profile.proof.requirement
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: the-proof-gap.rel.1
    type: holdsRole
    from: entity.claimant
    to: role.claimant
    description: Claimant presents assertion and supporting evidence
  - id: the-proof-gap.rel.2
    type: evaluates
    from: entity.verifier
    to: artifact.proof-requirement.profile
    description: Verifier checks claim against proof thresholds
  - id: the-proof-gap.rel.3
    type: assesses
    from: entity.assessor
    to: artifact.proof-requirement.profile
    description: Assessment reviews evidence quality and completeness
  - id: the-proof-gap.rel.4
    type: reliesOn
    from: entity.verifier
    to: entity.policy-authority
    description: Verifier uses declared proof standard
  - id: the-proof-gap.rel.5
    type: affects
    from: artifact.proof-requirement.profile
    to: effect.proof-outcome
    description: Proof standard shapes accept, deny, or degrade effect
  artifacts:
  - id: artifact.the.proof.gap
    type: Artifact
    label: Proof Requirement Profile
    sourceRef: artifacts/the-proof-gap/artifact.yaml
    schemaRef: artifacts/the-proof-gap/schemas/proof-requirement-profile.yaml
  policies:
  - id: policy.the.proof.gap
    label: Proof Requirement Profile
    decisionMode: mixed
    profileRef: profile.proof.requirement
    rules:
    - Require enough evidence to support each asserted claim
    - Bind proof to assessment and verification method
    - Produce traceable record of evidence and outcome
    contextRef: context.the-proof-gap
  controls:
  - id: control.evidence-sufficiency
    type: evidence-threshold
    description: Require enough evidence to support each asserted claim
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.claim-without-proof
    - threat.evidence-opacity
  - id: control.method-binding
    type: method-disclosure
    description: Bind proof to assessment and verification method
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.claim-without-proof
    - threat.evidence-opacity
  - id: control.receipt-traceability
    type: traceability
    description: Produce traceable record of evidence and outcome
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.claim-without-proof
    - threat.evidence-opacity
  threats:
  - id: threat.claim-without-proof
    type: unsupported-claim
    description: Claim is relied on without sufficient supporting evidence
  - id: threat.evidence-opacity
    type: audit-failure
    description: Proof basis cannot be reconstructed or contested
  evidence:
  - id: evidence.proof.requirement.receipt
    type: decision-receipt
    description: Structured evidence bundle for Proof Requirement Profile.
    supportsRefs:
    - policy.the.proof.gap
    - decision.proof.requirement
    - control.evidence-sufficiency
    - control.method-binding
    - control.receipt-traceability
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.the.proof.gap
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.the.proof.gap
    - evidence.proof.requirement.receipt
  trustDecisions:
  - id: decision.proof.requirement
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.the.proof.gap
    verificationRefs:
    - verification.the.proof.gap
    effectRefs:
    - effect.accept-supported-claim
    - effect.degrade-insufficient-claim
    - effect.deny-unsupported-claim
    contextRef: context.the-proof-gap
  effects:
  - id: effect.accept-supported-claim
    class: operational
    action: Accept claim with sufficient proof
    status: conditional
  - id: effect.degrade-insufficient-claim
    class: protective
    action: Warn or degrade when evidence is thin
    status: conditional
  - id: effect.deny-unsupported-claim
    class: governance
    action: Deny claim lacking sufficient proof
    status: conditional
  lifecycle:
    modelId: lifecycle.the-proof-gap
    label: Lifecycle for Proof Requirement Profile
    appliesTo:
    - artifact.the.proof.gap
    - decision.proof.requirement
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Proof Requirement Profile
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.proof.requirement.receipt
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.proof.requirement
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

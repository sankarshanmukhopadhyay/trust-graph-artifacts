bindingId: tga.tsmm.digital-credential-verification-policy-playbook
label: TSMM projection for digital-credential-verification-policy-playbook
artifactRef: artifacts/digital-credential-verification-policy-playbook/artifact.yaml
sourceEssay: Why Digital Credential Verification Needs a New Policy Playbook
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.digital-credential-verification-policy-playbook
    label: Credential verification policy and admissibility governance
    description: Trust Graph operationalization of Why Digital Credential Verification
      Needs a New Policy Playbook as executable governance.
  profile:
    id: profile.verification.playbook
    label: Verification Policy Profile
    constraintSetRef: artifacts/digital-credential-verification-policy-playbook/schemas/verification-policy-profile.yaml
  entities:
  - id: entity.issuer
    type: Issuer
    label: Issuer
    description: Issuer of credential and status signals
    roles:
    - id: role.issuer
      label: Issuer
      authorityRefs:
      - authority.issuer
    authorities:
    - id: authority.issuer
      scope: Issuer of credential and status signals
      source: profile.verification.playbook
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.verifier
    type: Verifier
    label: Verifier
    description: Verifier applying policy to credential acceptance
    roles:
    - id: role.verifier
      label: Verifier
      authorityRefs:
      - authority.verifier
    authorities:
    - id: authority.verifier
      scope: Verifier applying policy to credential acceptance
      source: profile.verification.playbook
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.subject
    type: Subject
    label: Subject
    description: Credential subject
    roles:
    - id: role.subject
      label: Subject
      authorityRefs:
      - authority.subject
    authorities:
    - id: authority.subject
      scope: Credential subject
      source: profile.verification.playbook
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.policy-authority
    type: GovernanceAuthority
    label: Policy Authority
    description: Authority defining verification policy profile
    roles:
    - id: role.policy-authority
      label: Policy Authority
      authorityRefs:
      - authority.policy-authority
    authorities:
    - id: authority.policy-authority
      scope: Authority defining verification policy profile
      source: profile.verification.playbook
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: digital-credential-verification-policy-playbook.rel.1
    type: holdsRole
    from: entity.policy-authority
    to: role.policy-author
    description: Authority defines admissibility and exception policy
  - id: digital-credential-verification-policy-playbook.rel.2
    type: issues
    from: entity.issuer
    to: artifact.verification.profile
    description: Issuer-related assertions are consumed under policy profile
  - id: digital-credential-verification-policy-playbook.rel.3
    type: evaluates
    from: entity.verifier
    to: artifact.verification.profile
    description: Verifier applies policy to claims, evidence, and context
  - id: digital-credential-verification-policy-playbook.rel.4
    type: reliesOn
    from: entity.verifier
    to: entity.policy-authority
    description: Verifier relies on profile for acceptance logic
  - id: digital-credential-verification-policy-playbook.rel.5
    type: affects
    from: artifact.verification.profile
    to: effect.verification-outcome
    description: Policy profile shapes trust decision effect
  artifacts:
  - id: artifact.digital.credential.verification.policy.playbook
    type: Artifact
    label: Verification Policy Profile
    sourceRef: artifacts/digital-credential-verification-policy-playbook/artifact.yaml
    schemaRef: artifacts/digital-credential-verification-policy-playbook/schemas/verification-policy-profile.yaml
  policies:
  - id: policy.digital.credential.verification.policy.playbook
    label: Verification Policy Profile
    decisionMode: mixed
    profileRef: profile.verification.playbook
    rules:
    - Require credential verification to run through policy profile, not cryptography
      alone
    - Route ambiguous or degraded results to defined review path
    - Require status and supporting evidence freshness at decision time
    contextRef: context.digital-credential-verification-policy-playbook
  controls:
  - id: control.policy-based-verification
    type: policy-evaluation
    description: Require credential verification to run through policy profile, not
      cryptography alone
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.crypto-only-acceptance
    - threat.status-staleness
  - id: control.exception-routing
    type: exception-handling
    description: Route ambiguous or degraded results to defined review path
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.crypto-only-acceptance
    - threat.status-staleness
  - id: control.status-freshness
    type: freshness-check
    description: Require status and supporting evidence freshness at decision time
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.crypto-only-acceptance
    - threat.status-staleness
  threats:
  - id: threat.crypto-only-acceptance
    type: policy-omission
    description: Verifier accepts a technically valid credential absent policy grounds
  - id: threat.status-staleness
    type: stale-evidence
    description: Verifier relies on outdated revocation or assurance data
  evidence:
  - id: evidence.verification.policy.receipt
    type: decision-receipt
    description: Structured evidence bundle for Verification Policy Profile.
    supportsRefs:
    - policy.digital.credential.verification.policy.playbook
    - decision.verification.policy
    - control.policy-based-verification
    - control.exception-routing
    - control.status-freshness
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.digital.credential.verification.policy.playbook
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.digital.credential.verification.policy.playbook
    - evidence.verification.policy.receipt
  trustDecisions:
  - id: decision.verification.policy
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.digital.credential.verification.policy.playbook
    verificationRefs:
    - verification.digital.credential.verification.policy.playbook
    effectRefs:
    - effect.accept-credential
    - effect.degrade-credential
    - effect.route-verification-review
    contextRef: context.digital-credential-verification-policy-playbook
  effects:
  - id: effect.accept-credential
    class: operational
    action: Accept credential for bounded use
    status: conditional
  - id: effect.degrade-credential
    class: protective
    action: Downgrade or warn under policy concerns
    status: conditional
  - id: effect.route-verification-review
    class: governance
    action: Escalate for manual or secondary review
    status: conditional
  lifecycle:
    modelId: lifecycle.digital-credential-verification-policy-playbook
    label: Lifecycle for Verification Policy Profile
    appliesTo:
    - artifact.digital.credential.verification.policy.playbook
    - decision.verification.policy
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Verification Policy Profile
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.verification.policy.receipt
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.verification.policy
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

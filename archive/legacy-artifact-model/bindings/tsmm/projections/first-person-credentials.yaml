bindingId: tga.tsmm.first-person-credentials
label: TSMM projection for first-person-credentials
artifactRef: artifacts/first-person-credentials/artifact.yaml
sourceEssay: First-Person Credentials
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.first-person-credentials
    label: First-person admissibility and challenge context
    description: Trust Graph operationalization of first-person assertions as governed
      identity inputs rather than informal explanation.
  profile:
    id: profile.first-person.assertion
    label: First-Person Assertion Envelope
    constraintSetRef: artifacts/first-person-credentials/schemas/first-person-assertion-envelope.yaml
  entities:
  - id: entity.asserting-subject
    type: Subject
    label: Asserting Subject
    description: Subject originating the first-person claim
    roles:
    - id: role.asserting-subject
      label: Asserting Subject
      authorityRefs:
      - authority.asserting-subject
    authorities:
    - id: authority.asserting-subject
      scope: Originate bounded first-person assertions about the self
      source: profile.first-person.assertion
      conditions:
      - claim must be bound to the originating subject
      - supporting evidence must be referenced for material assertions
      revocationStatus: active
      timeBounds: bounded-by-valid-until
      obligations:
      - preserve evidence links and supersession history
      - participate in challenge or correction flows where required
  - id: entity.counterparty
    type: RelyingParty
    label: Counterparty
    description: Relying counterparty evaluating the assertion
    roles:
    - id: role.counterparty
      label: Counterparty
      authorityRefs:
      - authority.counterparty
    authorities:
    - id: authority.counterparty
      scope: Accept or reject assertions against declared requirements
      source: profile.first-person.assertion
      conditions:
      - must evaluate against declared counterparty requirements
      - must preserve challenge path for contested assertions
      revocationStatus: active
      timeBounds: transaction-bounded
      obligations:
      - record admissibility outcome
      - issue structured challenge or acceptance evidence
  - id: entity.verifier
    type: Verifier
    label: Assertion Verifier
    description: Verifier checking evidence integrity and attestation conditions
    roles:
    - id: role.assertion-verifier
      label: Assertion Verifier
      authorityRefs:
      - authority.assertion-verifier
    authorities:
    - id: authority.assertion-verifier
      scope: Evaluate attestation method and evidence sufficiency
      source: profile.first-person.assertion
      conditions:
      - must verify evidence links and envelope completeness
      revocationStatus: active
      timeBounds: decision-time
      obligations:
      - emit verification outcome for material decisions
  - id: entity.dispute-resolver
    type: GovernanceAuthority
    label: Dispute Resolver
    description: Resolver handling challenges, corrections, and supersession
    roles:
    - id: role.dispute-resolver
      label: Dispute Resolver
      authorityRefs:
      - authority.dispute-resolver
    authorities:
    - id: authority.dispute-resolver
      scope: Resolve challenge, correction, and supersession outcomes
      source: profile.first-person.assertion
      conditions:
      - challenge endpoint must remain reachable for contested claims
      revocationStatus: active
      timeBounds: case-bounded
      obligations:
      - record challenge outcome and remediation path
  relationships:
  - id: first-person-credentials.rel.1
    type: asserts
    from: entity.asserting-subject
    to: artifact.first-person.assertion
    description: Subject originates the first-person assertion envelope
  - id: first-person-credentials.rel.2
    type: evaluates
    from: entity.counterparty
    to: artifact.first-person.assertion
    description: Counterparty evaluates the claim against acceptance requirements
  - id: first-person-credentials.rel.3
    type: verifies
    from: entity.verifier
    to: artifact.first-person.assertion
    description: Verifier checks evidence links and attestation method
  - id: first-person-credentials.rel.4
    type: adjudicates
    from: entity.dispute-resolver
    to: artifact.first-person.assertion
    description: Dispute resolver handles contested claim outcomes
  artifacts:
  - id: artifact.first-person.assertion
    type: Artifact
    label: First-Person Assertion Envelope
    sourceRef: artifacts/first-person-credentials/artifact.yaml
    schemaRef: artifacts/first-person-credentials/schemas/first-person-assertion-envelope.yaml
  policies:
  - id: policy.first-person.admissibility
    label: First-Person Admissibility Policy
    decisionMode: assisted
    profileRef: profile.first-person.assertion
    rules:
    - Require a bound subject identifier and attestation method
    - Require at least one supporting or corroborating evidence link for material
      claims
    - Require a dispute endpoint for contested assertions
    contextRef: context.first-person-credentials
  controls:
  - id: control.assertion-binding
    type: assertion-binding
    description: Bind a first-person assertion cryptographically to the originating
      subject
  - id: control.evidence-link-integrity
    type: evidence-integrity
    description: Require supporting evidence references for material first-person
      claims
  - id: control.counterparty-policy-check
    type: admissibility-check
    description: Require evaluation against declared acceptance requirements
  - id: control.dispute-endpoint-required
    type: contestability
    description: Require a challenge path for corrections and disputes
  threats:
  - id: threat.unbound-assertion
    label: Unbound Assertion
    description: A first-person claim is presented without trustworthy binding to
      the originating subject
  - id: threat.non-contestable-acceptance
    label: Non-Contestable Acceptance
    description: A counterparty accepts or rejects a material assertion without a
      challenge path
  evidence:
  - id: evidence.assertion-envelope
    type: assertion-envelope
    description: Structured first-person assertion with subject binding, claim, and
      evidence links
  - id: evidence.admissibility-record
    type: decision-receipt
    description: Record of counterparty admissibility decision and verification outcome
  verifications:
  - id: verification.assertion-envelope
    label: Verify assertion envelope completeness
    evidenceRef: evidence.assertion-envelope
    controlRefs:
    - control.assertion-binding
    - control.evidence-link-integrity
    - control.dispute-endpoint-required
    performedBy: entity.verifier
  trustDecisions:
  - id: decision.first-person.admissibility
    label: Determine whether the first-person assertion is admissible
    policyRef: policy.first-person.admissibility
    verificationRefs:
    - verification.assertion-envelope
    effectRefs:
    - effect.accept-assertion
    - effect.challenge-assertion
    - effect.reject-assertion
  effects:
  - id: effect.accept-assertion
    label: Accept Assertion
    type: permit
    description: Counterparty accepts the assertion for the declared scope
  - id: effect.challenge-assertion
    label: Challenge Assertion
    type: review
    description: Counterparty routes the assertion to dispute handling or additional
      review
  - id: effect.reject-assertion
    label: Reject Assertion
    type: deny
    description: Counterparty rejects the assertion for insufficient evidence or policy
      mismatch
  lifecycle:
    states:
    - name: issued
      label: Issued
    - name: active
      label: Active
    - name: suspended
      label: Suspended
    - name: revoked
      label: Revoked
    - name: expired
      label: Expired
    transitions:
    - from: issued
      to: active
      trigger: assertion-published
    - from: active
      to: suspended
      trigger: evidence-under-challenge
    - from: active
      to: revoked
      trigger: subject-withdraws-or-supersedes-assertion
    - from: active
      to: expired
      trigger: valid-until-reached
    - from: suspended
      to: active
      trigger: challenge-resolved-and-assertion-maintained

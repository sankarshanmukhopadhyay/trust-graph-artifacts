bindingId: tga.tsmm.wallet-to-agent-identity
label: TSMM projection for wallet-to-agent-identity
artifactRef: artifacts/wallet-to-agent-identity/artifact.yaml
sourceEssay: 'Wallet-to-Agent Identity: When Identity Becomes an Execution Interface'
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.wallet-to-agent-identity
    label: Wallet-mediated agent identity and execution control
    description: 'Trust Graph operationalization of Wallet-to-Agent Identity: When
      Identity Becomes an Execution Interface as executable governance.'
  profile:
    id: profile.wallet.agent.binding
    label: Wallet-Agent Binding Contract
    constraintSetRef: artifacts/wallet-to-agent-identity/schemas/wallet-agent-binding-contract.yaml
  entities:
  - id: entity.wallet
    type: Subject
    label: Wallet
    description: Wallet or identity holder surface
    roles:
    - id: role.wallet
      label: Wallet
      authorityRefs:
      - authority.wallet
    authorities:
    - id: authority.wallet
      scope: Wallet or identity holder surface
      source: profile.wallet.agent.binding
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.agent
    type: Agent
    label: Agent
    description: Agent acting through wallet-mediated identity
    roles:
    - id: role.agent
      label: Agent
      authorityRefs:
      - authority.agent
    authorities:
    - id: authority.agent
      scope: Agent acting through wallet-mediated identity
      source: profile.wallet.agent.binding
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.service
    type: RegistryService
    label: Service
    description: External relying service or tool endpoint
    roles:
    - id: role.service
      label: Service
      authorityRefs:
      - authority.service
    authorities:
    - id: authority.service
      scope: External relying service or tool endpoint
      source: profile.wallet.agent.binding
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.binding-verifier
    type: Verifier
    label: Binding Verifier
    description: Verifier of wallet-agent binding and status
    roles:
    - id: role.binding-verifier
      label: Binding Verifier
      authorityRefs:
      - authority.binding-verifier
    authorities:
    - id: authority.binding-verifier
      scope: Verifier of wallet-agent binding and status
      source: profile.wallet.agent.binding
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: wallet-to-agent-identity.rel.1
    type: holdsRole
    from: entity.wallet
    to: role.identity-anchor
    description: Wallet anchors subject identity and permissions
  - id: wallet-to-agent-identity.rel.2
    type: holdsRole
    from: entity.agent
    to: role.bound-agent
    description: Agent acts via wallet-bound execution interface
  - id: wallet-to-agent-identity.rel.3
    type: binds
    from: entity.wallet
    to: entity.agent
    description: Wallet binds identity, permissions, and execution conditions to agent
  - id: wallet-to-agent-identity.rel.4
    type: invokes
    from: entity.agent
    to: entity.service
    description: Agent presents wallet-bound contract at invocation time
  - id: wallet-to-agent-identity.rel.5
    type: verifies
    from: entity.binding-verifier
    to: artifact.wallet-agent.binding
    description: Verifier checks binding status, scope, and freshness
  artifacts:
  - id: artifact.wallet.to.agent.identity
    type: Artifact
    label: Wallet-Agent Binding Contract
    sourceRef: artifacts/wallet-to-agent-identity/artifact.yaml
    schemaRef: artifacts/wallet-to-agent-identity/schemas/wallet-agent-binding-contract.yaml
  policies:
  - id: policy.wallet.to.agent.identity
    label: Wallet-Agent Binding Contract
    decisionMode: mixed
    profileRef: profile.wallet.agent.binding
    rules:
    - Ensure wallet-agent binding is intact and current
    - Restrict execution to declared session or task context
    - Terminate binding when wallet authorization is withdrawn
    contextRef: context.wallet-to-agent-identity
  controls:
  - id: control.binding-integrity
    type: binding-validation
    description: Ensure wallet-agent binding is intact and current
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.identity-authority-collapse
    - threat.stale-binding
  - id: control.session-scope
    type: context-bound-scope
    description: Restrict execution to declared session or task context
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.identity-authority-collapse
    - threat.stale-binding
  - id: control.detach-on-revoke
    type: revocation-propagation
    description: Terminate binding when wallet authorization is withdrawn
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.identity-authority-collapse
    - threat.stale-binding
  threats:
  - id: threat.identity-authority-collapse
    type: scope-confusion
    description: Identity proof is mistaken for execution authority
  - id: threat.stale-binding
    type: stale-state
    description: Revoked wallet-agent linkage remains usable downstream
  evidence:
  - id: evidence.wallet.agent.binding.receipt
    type: decision-receipt
    description: Structured evidence bundle for Wallet-Agent Binding Contract.
    supportsRefs:
    - policy.wallet.to.agent.identity
    - decision.wallet.agent.binding
    - control.binding-integrity
    - control.session-scope
    - control.detach-on-revoke
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.wallet.to.agent.identity
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.wallet.to.agent.identity
    - evidence.wallet.agent.binding.receipt
  trustDecisions:
  - id: decision.wallet.agent.binding
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.wallet.to.agent.identity
    verificationRefs:
    - verification.wallet.to.agent.identity
    effectRefs:
    - effect.allow-bound-execution
    - effect.block-unbound-execution
    - effect.detach-agent-binding
    contextRef: context.wallet-to-agent-identity
  effects:
  - id: effect.allow-bound-execution
    class: operational
    action: Permit execution with valid wallet-agent binding
    status: conditional
  - id: effect.block-unbound-execution
    class: protective
    action: Deny where identity exists without authority binding
    status: conditional
  - id: effect.detach-agent-binding
    class: governance
    action: Invalidate downstream use after binding revocation
    status: conditional
  lifecycle:
    modelId: lifecycle.wallet-to-agent-identity
    label: Lifecycle for Wallet-Agent Binding Contract
    appliesTo:
    - artifact.wallet.to.agent.identity
    - decision.wallet.agent.binding
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Wallet-Agent Binding Contract
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.wallet.agent.binding.receipt
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.wallet.agent.binding
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

bindingId: tga.tsmm.layers-of-the-self
label: TSMM projection for layers-of-the-self
artifactRef: artifacts/layers-of-the-self/artifact.yaml
sourceEssay: Layers of the Self
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.layers-of-the-self
    label: Contextual identity projection context
    description: Trust Graph operationalization of bounded identity disclosure and
      correlation control.
  profile:
    id: profile.contextual.identity.projection
    label: Contextual Identity Projection
    constraintSetRef: artifacts/layers-of-the-self/schemas/contextual-identity-projection.yaml
  entities:
  - id: entity.base-identity-holder
    type: Subject
    label: Base Identity Holder
    description: Holder of the base identity from which projections are derived
    roles:
    - id: role.base-identity-holder
      label: Base Identity Holder
      authorityRefs:
      - authority.base-identity-holder
    authorities:
    - id: authority.base-identity-holder
      scope: Derive or withdraw contextual projections of the self
      source: profile.contextual.identity.projection
      conditions:
      - projection must be bounded by active role, context, and disclosure policy
      revocationStatus: active
      timeBounds: projection-window
      obligations:
      - keep projection within declared attribute subset
  - id: entity.wallet
    type: Subject
    label: Wallet
    description: Wallet or holder surface carrying the contextual projection
    roles:
    - id: role.wallet
      label: Wallet
      authorityRefs:
      - authority.wallet
    authorities:
    - id: authority.wallet
      scope: Present projection only to permitted audience and purpose
      source: profile.contextual.identity.projection
      conditions:
      - presentation must stay within audience and permitted use
      revocationStatus: active
      timeBounds: session-bounded
      obligations:
      - support invalidation when projection is withdrawn
  - id: entity.presentation-verifier
    type: Verifier
    label: Presentation Verifier
    description: Verifier checking validity, audience, and minimization bounds
    roles:
    - id: role.presentation-verifier
      label: Presentation Verifier
      authorityRefs:
      - authority.presentation-verifier
    authorities:
    - id: authority.presentation-verifier
      scope: Verify projection validity, context, and disclosure bounds
      source: profile.contextual.identity.projection
      conditions:
      - must reject over-disclosure or wrong-context use
      revocationStatus: active
      timeBounds: presentation-time
      obligations:
      - record decision outcome for contested disclosure
  - id: entity.linkage-authority
    type: GovernanceAuthority
    label: Linkage Authority
    description: Authority permitted to correlate a projection back to the base identity
      under declared rules
    roles:
    - id: role.linkage-authority
      label: Linkage Authority
      authorityRefs:
      - authority.linkage-authority
    authorities:
    - id: authority.linkage-authority
      scope: Perform correlation only where linkage rules explicitly allow it
      source: profile.contextual.identity.projection
      conditions:
      - correlation must be bounded to declared authorities and contexts
      revocationStatus: active
      timeBounds: case-bounded
      obligations:
      - record any authorized linkage event
  relationships:
  - id: layers-of-the-self.rel.1
    type: derives
    from: entity.base-identity-holder
    to: artifact.contextual.identity.projection
    description: Base identity holder derives a bounded projection
  - id: layers-of-the-self.rel.2
    type: presents
    from: entity.wallet
    to: artifact.contextual.identity.projection
    description: Wallet presents the projection within declared audience and use
  - id: layers-of-the-self.rel.3
    type: verifies
    from: entity.presentation-verifier
    to: artifact.contextual.identity.projection
    description: Verifier checks context, minimization, and validity before acceptance
  - id: layers-of-the-self.rel.4
    type: links
    from: entity.linkage-authority
    to: entity.base-identity-holder
    description: Linkage authority may correlate the projection only when explicitly
      allowed
  artifacts:
  - id: artifact.contextual.identity.projection
    type: Artifact
    label: Contextual Identity Projection
    sourceRef: artifacts/layers-of-the-self/artifact.yaml
    schemaRef: artifacts/layers-of-the-self/schemas/contextual-identity-projection.yaml
  policies:
  - id: policy.identity.projection
    label: Contextual Disclosure Policy
    decisionMode: deterministic
    profileRef: profile.contextual.identity.projection
    rules:
    - Require the minimum attribute subset needed for the declared context
    - Deny presentation outside permitted audience or use
    - Constrain correlation to declared linkage authorities and rules
    contextRef: context.layers-of-the-self
  controls:
  - id: control.projection-minimization
    type: data-minimization
    description: Restrict identity projections to the minimum necessary attribute
      set
  - id: control.linkage-constraint
    type: correlation-control
    description: Constrain when the projection may be linked back to the base identity
  - id: control.invalidation-endpoint
    type: projection-invalidation
    description: Require explicit invalidation path for withdrawn projections
  threats:
  - id: threat.over-disclosure
    label: Over-Disclosure
    description: The presentation reveals more identity attributes than the context
      justifies
  - id: threat.unauthorized-correlation
    label: Unauthorized Correlation
    description: A relying party or service correlates the projection back to the
      base identity without authority
  evidence:
  - id: evidence.identity-projection
    type: projection-record
    description: Contextual projection containing role, context, attribute subset,
      and disclosure policy
  - id: evidence.presentation-record
    type: presentation-receipt
    description: Record of audience, permitted use, and verification outcome for each
      projection presentation
  verifications:
  - id: verification.identity-projection
    label: Verify projection disclosure bounds
    evidenceRef: evidence.identity-projection
    controlRefs:
    - control.projection-minimization
    - control.linkage-constraint
    - control.invalidation-endpoint
    performedBy: entity.presentation-verifier
  trustDecisions:
  - id: decision.identity-projection
    label: Determine whether the projection is acceptable for the declared context
    policyRef: policy.identity.projection
    verificationRefs:
    - verification.identity-projection
    effectRefs:
    - effect.accept-projection
    - effect.limit-projection
    - effect.reject-projection
  effects:
  - id: effect.accept-projection
    label: Accept Projection
    type: permit
    description: Accept the projection for the declared audience and use
  - id: effect.limit-projection
    label: Limit Projection
    type: modify
    description: Require a narrower subset or stricter presentation condition
  - id: effect.reject-projection
    label: Reject Projection
    type: deny
    description: Reject the projection because context, audience, or correlation rules
      are violated
  lifecycle:
    states:
    - name: issued
      label: Issued
    - name: active
      label: Active
    - name: suspended
      label: Suspended
    - name: revoked
      label: Revoked
    - name: expired
      label: Expired
    transitions:
    - from: issued
      to: active
      trigger: projection-published
    - from: active
      to: suspended
      trigger: projection-under-review
    - from: active
      to: revoked
      trigger: holder-withdraws-or-invalidates-projection
    - from: active
      to: expired
      trigger: valid-until-reached
    - from: suspended
      to: active
      trigger: review-complete-and-bounds-confirmed

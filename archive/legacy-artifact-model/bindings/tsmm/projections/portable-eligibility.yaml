bindingId: tga.tsmm.portable-eligibility
label: TSMM projection for portable-eligibility
artifactRef: artifacts/portable-eligibility/artifact.yaml
sourceEssay: 'Portable Eligibility: Turning Credentials into Composable Market Access'
tsmmVersion: v0.16.0
tsmmReferences:
  coreModel: docs/core-model.md
  relationshipModel: docs/relationship-model.md
  graphSchema: schemas/tsmm-graph.schema.json
  bindingSchema: schemas/tsmm-binding.schema.json
  lifecycleSchema: schemas/tsmm-lifecycle.schema.json
projection:
  governanceContext:
    id: context.portable-eligibility
    label: Portable eligibility and composable market access governance
    description: 'Trust Graph operationalization of Portable Eligibility: Turning
      Credentials into Composable Market Access as executable governance.'
  profile:
    id: profile.portable.eligibility
    label: Portable Eligibility Credential Profile
    constraintSetRef: artifacts/portable-eligibility/schemas/portable-eligibility-credential-profile.yaml
  entities:
  - id: entity.eligibility-issuer
    type: Issuer
    label: Eligibility Issuer
    description: Issuer of portable eligibility assertion
    roles:
    - id: role.eligibility-issuer
      label: Eligibility Issuer
      authorityRefs:
      - authority.eligibility-issuer
    authorities:
    - id: authority.eligibility-issuer
      scope: Issuer of portable eligibility assertion
      source: profile.portable.eligibility
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.market-service
    type: RegistryService
    label: Market Service
    description: Service or marketplace consuming eligibility
    roles:
    - id: role.market-service
      label: Market Service
      authorityRefs:
      - authority.market-service
    authorities:
    - id: authority.market-service
      scope: Service or marketplace consuming eligibility
      source: profile.portable.eligibility
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.subject
    type: Subject
    label: Subject
    description: Holder of eligibility status
    roles:
    - id: role.subject
      label: Subject
      authorityRefs:
      - authority.subject
    authorities:
    - id: authority.subject
      scope: Holder of eligibility status
      source: profile.portable.eligibility
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  - id: entity.verifier
    type: Verifier
    label: Verifier
    description: Verifier checking portability, freshness, and constraints
    roles:
    - id: role.verifier
      label: Verifier
      authorityRefs:
      - authority.verifier
    authorities:
    - id: authority.verifier
      scope: Verifier checking portability, freshness, and constraints
      source: profile.portable.eligibility
      conditions:
      - bounded by declared profile and policy
      - subject to lifecycle status and revocation checks
      revocationStatus: active
      timeBounds: bounded-by-profile
      obligations:
      - generate or preserve evidence for material decisions
  relationships:
  - id: portable-eligibility.rel.1
    type: issues
    from: entity.eligibility-issuer
    to: artifact.portable-eligibility.profile
    description: Issuer packages eligibility assertion and portability terms
  - id: portable-eligibility.rel.2
    type: reliesOn
    from: entity.market-service
    to: entity.verifier
    description: Market service relies on verified eligibility outcome
  - id: portable-eligibility.rel.3
    type: evaluates
    from: entity.verifier
    to: artifact.portable-eligibility.profile
    description: Verifier checks admissibility and reuse constraints
  - id: portable-eligibility.rel.4
    type: affects
    from: artifact.portable-eligibility.profile
    to: effect.market-access
    description: Profile shapes market access effect
  - id: portable-eligibility.rel.5
    type: supports
    from: entity.subject
    to: decision.portable.eligibility
    description: Subject presents portable eligibility for decision
  artifacts:
  - id: artifact.portable.eligibility
    type: Artifact
    label: Portable Eligibility Credential Profile
    sourceRef: artifacts/portable-eligibility/artifact.yaml
    schemaRef: artifacts/portable-eligibility/schemas/portable-eligibility-credential-profile.yaml
  policies:
  - id: policy.portable.eligibility
    label: Portable Eligibility Credential Profile
    decisionMode: mixed
    profileRef: profile.portable.eligibility
    rules:
    - Define where and how eligibility can be reused
    - Require live or bounded-fresh status before access
    - Declare external dependencies and governance assumptions for portability
    contextRef: context.portable-eligibility
  controls:
  - id: control.portability-bounds
    type: reuse-boundary
    description: Define where and how eligibility can be reused
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.over-portability
    - threat.stale-eligibility
  - id: control.eligibility-freshness
    type: freshness-check
    description: Require live or bounded-fresh status before access
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.over-portability
    - threat.stale-eligibility
  - id: control.dependency-disclosure
    type: dependency-disclosure
    description: Declare external dependencies and governance assumptions for portability
    registryRef: controls/registry.yaml
    mitigatesThreatRefs:
    - threat.over-portability
    - threat.stale-eligibility
  threats:
  - id: threat.over-portability
    type: context-leakage
    description: Eligibility is reused outside intended context
  - id: threat.stale-eligibility
    type: stale-state
    description: Expired or changed eligibility continues granting access
  evidence:
  - id: evidence.portable.eligibility.receipt
    type: decision-receipt
    description: Structured evidence bundle for Portable Eligibility Credential Profile.
    supportsRefs:
    - policy.portable.eligibility
    - decision.portable.eligibility
    - control.portability-bounds
    - control.eligibility-freshness
    - control.dependency-disclosure
    requiredFields:
    - authority_used
    - policy_evaluated
    - facts_input
    - outcome
    - timestamp
  verifications:
  - id: verification.portable.eligibility
    method: tsmm-binding-conformance-check
    result: required
    inputRefs:
    - artifact.portable.eligibility
    - evidence.portable.eligibility.receipt
  trustDecisions:
  - id: decision.portable.eligibility
    outcomeModes:
    - allow
    - deny
    - degrade
    - review
    policyRef: policy.portable.eligibility
    verificationRefs:
    - verification.portable.eligibility
    effectRefs:
    - effect.grant-market-access
    - effect.require-step-up-check
    - effect.deny-portability
    contextRef: context.portable-eligibility
  effects:
  - id: effect.grant-market-access
    class: operational
    action: Grant bounded market access
    status: conditional
  - id: effect.require-step-up-check
    class: protective
    action: Require additional review or evidence
    status: conditional
  - id: effect.deny-portability
    class: governance
    action: Deny reuse outside portability rules
    status: conditional
  lifecycle:
    modelId: lifecycle.portable-eligibility
    label: Lifecycle for Portable Eligibility Credential Profile
    appliesTo:
    - artifact.portable.eligibility
    - decision.portable.eligibility
    states:
    - id: state.issued
      name: issued
      description: Declared and available for governed use
      entryEvidence: manifest created
    - id: state.active
      name: active
      description: Usable for runtime or assessment decisions
      entryEvidence: policy and controls available
    - id: state.suspended
      name: suspended
      description: Temporarily paused pending review or challenge
      entryEvidence: review or incident open
    - id: state.revoked
      name: revoked
      description: Withdrawn and no longer valid for reliance
      entryEvidence: revocation event recorded
    - id: state.expired
      name: expired
      description: No longer valid due to freshness or time bounds
      entryEvidence: time bound elapsed
    transitions:
    - id: transition.issue
      from: state.issued
      to: state.active
      trigger: admission and publication
      actor: maintainer or policy authority
      evidenceRequirement: manifest plus schema present
    - id: transition.suspend
      from: state.active
      to: state.suspended
      trigger: challenge, incident, or evidence gap
      actor: policy authority or assessor
      evidenceRequirement: issue or review record
    - id: transition.revoke
      from: state.active
      to: state.revoked
      trigger: authority withdrawn or non-conformance confirmed
      actor: policy authority
      evidenceRequirement: revocation record with rationale
    - id: transition.resume
      from: state.suspended
      to: state.active
      trigger: issue resolved
      actor: policy authority or maintainer
      evidenceRequirement: updated evidence or corrected policy
    - id: transition.expire
      from: state.active
      to: state.expired
      trigger: time bound or freshness window elapsed
      actor: system
      evidenceRequirement: timestamp comparison or expiry check
  conceptMappings:
  - externalConcept: Portable Eligibility Credential Profile
    tsmmType: Policy
    bindingStrength: approximate
    description: Primary artifact acts as policy/profile surface for trust decision.
  - externalConcept: evidence.portable.eligibility.receipt
    tsmmType: EvidenceBundle
    bindingStrength: exact
    description: Decision receipt acts as evidence bundle for auditability.
  - externalConcept: decision.portable.eligibility
    tsmmType: TrustDecision
    bindingStrength: exact
    description: Binding makes outcome and effect path explicit.
  knownLimits:
  - Projection is repo-local and does not yet emit a TSMM JSON graph instance.
  - Foundational three artifacts remain outside this binding layer in this increment.
  validation:
    script: scripts/validate_tsmm_bindings.py
    checks:
    - required projection sections
    - registry references resolve
    - trust decision to effect linkage
    - lifecycle minimum states present

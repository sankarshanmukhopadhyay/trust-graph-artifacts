registryId: tga.controls.registry.v1
label: TGA TSMM Control Registry
description: Shared control registry for TSMM projections across the 12-artifact expansion
  set.
entries:
- id: control.appeal-route
  type: contestability
  description: Provide bounded path for challenge and review
  artifacts:
  - crisis-of-narrative-control
- id: control.assertion-binding
  type: assertion-binding
  description: Bind a first-person assertion cryptographically to the originating
    subject
  artifacts:
  - first-person-credentials
- id: control.audit-reference-required
  type: audit-linkage
  description: Require each governed consent object to expose an audit reference
  artifacts:
  - consent-not-data-structure
- id: control.binding-integrity
  type: binding-validation
  description: Ensure wallet-agent binding is intact and current
  artifacts:
  - wallet-to-agent-identity
- id: control.cascading-revocation
  type: revocation-propagation
  description: Invalidate derived authority when parent authority changes
  artifacts:
  - delegation-after-identity
- id: control.cascading-stop
  type: revocation-stop
  description: Stop downstream effect when delegated authority is revoked
  artifacts:
  - execution-time-delegation
- id: control.chain-depth-limit
  type: delegation-depth
  description: Prevent hidden over-delegation across agent chains
  artifacts:
  - after-consent
- id: control.controller-disclosure
  type: transparency-control
  description: Require declaration of hidden control surfaces and dependencies
  artifacts:
  - systemic-controllers
- id: control.counterparty-policy-check
  type: admissibility-check
  description: Require the counterparty to evaluate a first-person claim against declared
    acceptance requirements
  artifacts:
  - first-person-credentials
- id: control.decision-receipt
  type: receipt-generation
  description: Generate structured receipt for material delegated action
  artifacts:
  - execution-time-delegation
- id: control.dependency-disclosure
  type: dependency-disclosure
  description: Declare external dependencies and governance assumptions for portability
  artifacts:
  - portable-eligibility
- id: control.dependency-mapping
  type: dependency-mapping
  description: Map systemic dependencies that can create concentrated risk
  artifacts:
  - systemic-controllers
- id: control.detach-on-revoke
  type: revocation-propagation
  description: Terminate binding when wallet authorization is withdrawn
  artifacts:
  - wallet-to-agent-identity
- id: control.dispute-endpoint-required
  type: contestability
  description: Require a challenge path for first-person claims and corrections
  artifacts:
  - first-person-credentials
- id: control.downstream-inheritance
  type: constraint-inheritance
  description: Require downstream processors to inherit and enforce consent constraints
  artifacts:
  - consent-not-data-structure
- id: control.effect-traceability
  type: effect-trace
  description: Trace what downstream effect a control action caused
  artifacts:
  - crisis-of-narrative-control
- id: control.eligibility-freshness
  type: freshness-check
  description: Require live or bounded-fresh status before access
  artifacts:
  - portable-eligibility
- id: control.evidence-link-integrity
  type: evidence-integrity
  description: Require supporting evidence references for material first-person claims
  artifacts:
  - first-person-credentials
- id: control.evidence-sufficiency
  type: evidence-threshold
  description: Require enough evidence to support each asserted claim
  artifacts:
  - the-proof-gap
- id: control.exception-routing
  type: exception-handling
  description: Route ambiguous or degraded results to defined review path
  artifacts:
  - digital-credential-verification-policy-playbook
- id: control.invalidation-endpoint
  type: projection-invalidation
  description: Require explicit invalidation or withdrawal path for contextual identity
    projections
  artifacts:
  - layers-of-the-self
- id: control.linkage-constraint
  type: correlation-control
  description: Constrain when a projection may be linked back to the base identity
  artifacts:
  - layers-of-the-self
- id: control.live-authority-check
  type: runtime-check
  description: Verify scope, freshness, and revocation at execution time
  artifacts:
  - execution-time-delegation
- id: control.mandate-completeness
  type: admissibility-check
  description: Require explicit task, scope, constraints, and review path
  artifacts:
  - your-agents-are-not-failing-your
- id: control.method-binding
  type: method-disclosure
  description: Bind proof to assessment and verification method
  artifacts:
  - the-proof-gap
- id: control.onward-transfer-check
  type: sharing-control
  description: Prevent downstream sharing absent permitted transfer terms
  artifacts:
  - machine-readable-privacy-terms
- id: control.operator-scope
  type: operator-scope-check
  description: Bind operator actions to charter and publication mandate
  artifacts:
  - trust-registry-governance-model
- id: control.override-accountability
  type: override-recording
  description: Record who can override or constrain downstream action
  artifacts:
  - systemic-controllers
- id: control.parent-chain-check
  type: chain-validation
  description: Verify parent chain continuity and status
  artifacts:
  - delegation-after-identity
- id: control.policy-based-verification
  type: policy-evaluation
  description: Require credential verification to run through policy profile, not
    cryptography alone
  artifacts:
  - digital-credential-verification-policy-playbook
- id: control.portability-bounds
  type: reuse-boundary
  description: Define where and how eligibility can be reused
  artifacts:
  - portable-eligibility
- id: control.projection-minimization
  type: data-minimization
  description: Restrict contextual identity projections to the minimum necessary attribute
    set
  artifacts:
  - layers-of-the-self
- id: control.purpose-binding
  type: purpose-binding
  description: Restrict delegated action to declared purpose and action class
  artifacts:
  - after-consent
- id: control.purpose-limitation
  type: purpose-control
  description: Restrict processing to declared purpose and lawful basis
  artifacts:
  - machine-readable-privacy-terms
- id: control.reason-code-required
  type: decision-explanation
  description: Require structured reasons for material narrative control
  artifacts:
  - crisis-of-narrative-control
- id: control.receipt-generation
  type: evidence-capture
  description: Generate decision receipt for each material action
  artifacts:
  - your-agents-are-not-failing-your
- id: control.receipt-traceability
  type: traceability
  description: Produce traceable record of evidence and outcome
  artifacts:
  - the-proof-gap
- id: control.registry-status-freshness
  type: publication-freshness
  description: Ensure status changes propagate before relying effects occur
  artifacts:
  - trust-registry-governance-model
- id: control.retention-expiry
  type: retention-control
  description: Terminate use when retention or freshness limits expire
  artifacts:
  - machine-readable-privacy-terms
- id: control.revocation-cascade
  type: delegation-revocation
  description: Cascade charter or listing revocation to downstream reliance
  artifacts:
  - trust-registry-governance-model
- id: control.revocation-endpoint
  type: revocation-endpoint
  description: Require an explicit endpoint or mechanism for consent withdrawal
  artifacts:
  - consent-not-data-structure
- id: control.scope-boundary
  type: delegation-scope
  description: Ensure child scope is narrower than parent
  artifacts:
  - delegation-after-identity
- id: control.session-scope
  type: context-bound-scope
  description: Restrict execution to declared session or task context
  artifacts:
  - wallet-to-agent-identity
- id: control.status-freshness
  type: freshness-check
  description: Require status and supporting evidence freshness at decision time
  artifacts:
  - digital-credential-verification-policy-playbook
- id: control.tool-use-constraint
  type: tool-binding
  description: Bind tool invocation to declared mandate fields
  artifacts:
  - your-agents-are-not-failing-your
- id: control.withdrawal-enforcement
  type: revocation-check
  description: Pause or deny on withdrawal, harm trigger, or re-consent requirement
  artifacts:
  - after-consent

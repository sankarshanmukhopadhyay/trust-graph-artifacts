id: execution-delegation-control-receipt
version: 0.1.0
type: object
required:
- receipt_id
- action_id
- delegate
- principal
- authority_basis
- control_checks
- outcome
properties:
  receipt_id:
    type: string
  action_id:
    type: string
  delegate:
    type: string
  principal:
    type: string
  authority_basis:
    type: string
  policy_version:
    type: string
  control_checks:
    type: array
    minItems: 1
    items:
      type: object
      required:
      - check
      - result
      properties:
        check:
          type: string
          enum:
          - scope-check
          - revocation-check
          - risk-check
          - human-threshold-check
          - reversibility-check
        result:
          type: string
          enum:
          - pass
          - fail
          - warning
  outcome:
    type: string
    enum:
    - executed
    - paused
    - denied
    - escalated
    - rolled-back
  reversibility_class:
    type: string
    enum:
    - reversible
    - partially-reversible
    - irreversible
  challenge_reference:
    type: string

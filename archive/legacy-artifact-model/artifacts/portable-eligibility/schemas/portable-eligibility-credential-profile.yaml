id: portable-eligibility-credential-profile
version: 0.1.0
type: object
required:
- credential_id
- subject
- eligibility_class
- qualifying_basis
- validity
- reliance_conditions
properties:
  credential_id:
    type: string
  subject:
    type: string
  eligibility_class:
    type: string
  qualifying_basis:
    type: array
    minItems: 1
    items:
      type: string
  jurisdiction:
    type: string
  validity:
    type: object
    required:
    - valid_from
    - valid_until
    properties:
      valid_from:
        type: string
        format: date-time
      valid_until:
        type: string
        format: date-time
      suspension_source:
        type: string
  reliance_conditions:
    type: array
    minItems: 1
    items:
      type: string
  counterparty_obligations:
    type: array
    items:
      type: string
  appeal_endpoint:
    type: string
